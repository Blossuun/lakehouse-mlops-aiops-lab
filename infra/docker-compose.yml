services:
  minio:
    image: minio/minio:latest
    container_name: lab-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16
    container_name: lab-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: lab-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command:
      - /bin/sh
      - -lc
      - >
        mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        --artifacts-destination s3://mlflow-artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 5s
      timeout: 3s
      retries: 20

  spark:
    image: apache/spark:3.5.5-scala2.12-java17-python3-ubuntu
    container_name: lab-spark
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # Use env credentials rather than hardcoding in spark-defaults.conf
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      HOME: /tmp
    volumes:
      - ./spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../jobs:/opt/lab/jobs:ro
      - ../scripts:/opt/lab/scripts:ro
      - spark_ivy:/tmp/.ivy2
    working_dir: /opt/lab
    command: ["/bin/bash", "-lc", "sleep infinity"]
    ports:
      - "4040:4040"
  
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: lab-hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${HMS_DB}
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD}
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
      HADOOP_CLASSPATH: /opt/hive/cache/*
    volumes:
      - ./hive/conf:/hive_custom_conf:ro
      - ./hive/cache:/opt/hive/cache
      - ./hive/lib/postgresql-42.5.1.jar:/opt/hive/lib/postgres.jar:ro
    ports:
      - "9083:9083"

  trino:
    image: trinodb/trino:477
    container_name: lab-trino
    depends_on:
      hive-metastore:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./trino/etc:/etc/trino:ro
    ports:
      - "8080:8080"

volumes:
  minio_data:
  pg_data:
  spark_ivy: